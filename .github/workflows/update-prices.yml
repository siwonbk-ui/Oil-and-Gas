name: Daily Auto-Update Oil Prices

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run Fetcher Script
        run: python update_prices.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          
          if git diff --staged --quiet; then
            echo "No price changes today, skipping commit."
          else
            git commit -m "Auto-update oil prices Data [skip ci]"
            git push
          fi
