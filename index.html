<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEA Oil Price Dashboard</title>
    <meta name="description" content="Dashboard for tracking daily retail oil prices in Southeast Asia (Thailand, Malaysia, Singapore, Indonesia).">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-droplet"></i>
                <span>OilTrack SEA</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-type="gasoline">
                    <i class="fa-solid fa-gas-pump"></i> Gasoline (เบนซิน)
                </a>
                <a href="#" class="nav-item" data-type="diesel">
                    <i class="fa-solid fa-truck-droplet"></i> Diesel (ดีเซล)
                </a>
            </nav>
            <div class="theme-toggle" id="theme-toggle">
                <i class="fa-solid fa-moon"></i>
                <span>Dark Mode</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Overview</h1>
                    <p class="subtitle">Latest retail fuel prices in Southeast Asia</p>
                </div>
                <div class="user-profile">
                    <span class="date-display" id="current-date">--</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <!-- Price Cards -->
            <section class="price-cards" id="price-cards-container">
                <!-- Cards will be generated by JS -->
            </section>

            <!-- Charts Section -->
            <section class="charts-section">
                <div class="chart-container main-chart">
                    <div class="chart-header">
                        <h2 id="trend-chart-title">Price Trends Overview</h2>
                        <select id="time-range" class="chart-select">
                            <option value="7">Last 7 Days</option>
                            <option value="30">Last 30 Days</option>
                        </select>
                    </div>
                    <div class="canvas-wrapper">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-container secondary-chart">
                    <div class="chart-header">
                        <h2>Price Comparison today (THB)</h2>
                    </div>
                    <div class="canvas-wrapper">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
